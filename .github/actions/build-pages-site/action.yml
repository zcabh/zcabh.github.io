name: Build Pages Site
description: Validate and build the static GitHub Pages site

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Validate page manifests
      shell: bash
      run: npm run validate

    - name: Build static site
      shell: bash
      run: npm run build
